<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brasa scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 24px 20px; }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 16px;}
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: var(--pedra);}
  .title { font-size: 13px; font-weight: 700; color: var(--carvao); letter-spacing: .02em;}
  .scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px;}
  .stop { display: flex; flex-direction: column; gap: 0; }
  .swatch { height: 64px; border-radius: 2px; }
  .meta { padding: 6px 2px 0;  display:flex; flex-direction:column; }
  .lbl { font-size: 10px; font-weight: 700; color: var(--carvao); }
  .hex { font-size: 9px; color: var(--pedra); letter-spacing: .04em; }
  .name { font-size: 9px; color: var(--grafite); margin-top: 2px; min-height: 12px; font-style: italic; }
  .primary .swatch { outline: 2px solid var(--carvao); outline-offset: 1px;}
  .primary .lbl::after { content: " ★"; color: var(--brasa);}
</style></head>
<body>
  <div class="head">
    <span class="eyebrow">Paleta · Brasa Viva</span>
    <span class="title">Cor primária da marca · #C06018</span>
  </div>
  <div class="scale">
    <div class="stop"><div class="swatch" style="background:#F9EDE3"></div><div class="meta"><span class="lbl">50</span><span class="hex">#F9EDE3</span><span class="name">Mínima</span></div></div>
    <div class="stop"><div class="swatch" style="background:#F0CEB4"></div><div class="meta"><span class="lbl">100</span><span class="hex">#F0CEB4</span><span class="name">—</span></div></div>
    <div class="stop"><div class="swatch" style="background:#E2A87A"></div><div class="meta"><span class="lbl">200</span><span class="hex">#E2A87A</span><span class="name">Clara</span></div></div>
    <div class="stop"><div class="swatch" style="background:#D48444"></div><div class="meta"><span class="lbl">300</span><span class="hex">#D48444</span><span class="name">—</span></div></div>
    <div class="stop primary"><div class="swatch" style="background:#C06018"></div><div class="meta"><span class="lbl">400</span><span class="hex">#C06018</span><span class="name">Viva</span></div></div>
    <div class="stop"><div class="swatch" style="background:#974A12"></div><div class="meta"><span class="lbl">600</span><span class="hex">#974A12</span><span class="name">Escura</span></div></div>
    <div class="stop"><div class="swatch" style="background:#73380D"></div><div class="meta"><span class="lbl">700</span><span class="hex">#73380D</span><span class="name">—</span></div></div>
    <div class="stop"><div class="swatch" style="background:#4E2508"></div><div class="meta"><span class="lbl">800</span><span class="hex">#4E2508</span><span class="name">—</span></div></div>
    <div class="stop"><div class="swatch" style="background:#2C1404"></div><div class="meta"><span class="lbl">900</span><span class="hex">#2C1404</span><span class="name">—</span></div></div>
  </div>
</body></html>
