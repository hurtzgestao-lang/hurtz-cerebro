<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Radii & borders</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px;}
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;}
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: var(--pedra);}
  .title { font-size: 13px; font-weight: 700; color: var(--carvao);}
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;}
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px;}
  .shape { width: 80px; height: 60px; background: var(--carvao); border: 1px solid var(--carvao);}
  .nm { font-size: 11px; font-weight: 700; color: var(--carvao);}
  .v { font-size: 10px; color: var(--pedra); letter-spacing: .04em;}
  .desc { font-size: 10px; color: var(--grafite); text-align: center; line-height: 1.3;}
</style></head>
<body>
  <div class="head"><span class="eyebrow">Cantos · Bordas</span><span class="title">Sem efeitos macios · 8 px é o teto</span></div>
  <div class="grid">
    <div class="cell"><div class="shape" style="border-radius:0"></div><span class="nm">none</span><span class="v">0 px</span><span class="desc">Tabelas, divisores</span></div>
    <div class="cell"><div class="shape" style="border-radius:2px"></div><span class="nm">sm</span><span class="v">2 px</span><span class="desc">Swatches, inputs</span></div>
    <div class="cell"><div class="shape" style="border-radius:4px"></div><span class="nm">md</span><span class="v">4 px</span><span class="desc">Botões, cards</span></div>
    <div class="cell"><div class="shape" style="border-radius:8px"></div><span class="nm">lg</span><span class="v">8 px</span><span class="desc">Containers grandes</span></div>
    <div class="cell"><div class="shape" style="border-radius:999px; width:90px;"></div><span class="nm">pill</span><span class="v">999 px</span><span class="desc">Badges, tags</span></div>
  </div>
</body></html>
