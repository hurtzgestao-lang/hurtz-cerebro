<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Type weights</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px;}
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;}
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: var(--pedra);}
  .title { font-size: 13px; font-weight: 700; color: var(--carvao);}
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px;}
  .cell { background:#fff; border: 1px solid var(--areia); padding: 18px;}
  .num { font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -0.01em;}
  .num.reg { font-weight: 400; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--pedra); margin-top: 12px;}
  .desc { font-size: 12px; color: var(--grafite); margin-top: 4px; line-height: 1.4;}
  .ab { display: flex; align-items: baseline; gap: 18px;}
  .ab .num { font-size: 38px;}
</style></head>
<body>
  <div class="head"><span class="eyebrow">Tipografia · Pesos</span><span class="title">Máximo 2 pesos por material</span></div>
  <div class="grid">
    <div class="cell">
      <div class="ab">
        <span class="num reg">Aa</span>
        <div>
          <div class="lbl" style="margin: 0;">Regular · 400</div>
          <div class="desc">Texto corrido, descrições, labels. Clareza sem ruído.</div>
        </div>
      </div>
    </div>
    <div class="cell">
      <div class="ab">
        <span class="num">Aa</span>
        <div>
          <div class="lbl" style="margin: 0;">Bold · 700</div>
          <div class="desc">Títulos, números, ênfase. Autoridade visível.</div>
        </div>
      </div>
    </div>
  </div>
</body></html>
