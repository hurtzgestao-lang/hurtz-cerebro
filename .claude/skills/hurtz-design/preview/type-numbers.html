<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Number emphasis</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px; background: var(--offwhite);}
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px;}
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: var(--pedra);}
  .title { font-size: 13px; font-weight: 700; color: var(--carvao);}
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;}
  .stat { padding: 16px 0;}
  .accent { width: 28px; height: 2px; background: var(--brasa); margin-bottom: 12px;}
  .num { font-size: 44px; font-weight: 700; line-height: 1; letter-spacing: -0.01em; color: var(--carvao); font-variant-numeric: tabular-nums;}
  .num small { font-size: 18px; font-weight: 700; color: var(--brasa); letter-spacing: 0; margin-left: 2px;}
  .lbl { font-size: 11px; font-weight: 400; line-height: 1.45; color: var(--grafite); margin-top: 10px; max-width: 180px;}
</style></head>
<body>
  <div class="head"><span class="eyebrow">Tipografia · Números</span><span class="title">Bold · 2× corpo · prova antes do adjetivo</span></div>
  <div class="grid">
    <div class="stat">
      <div class="accent"></div>
      <div class="num">R$34<small>M</small></div>
      <div class="lbl">por mês em vendas dos clientes ativos.</div>
    </div>
    <div class="stat">
      <div class="accent"></div>
      <div class="num">50<small>/dia</small></div>
      <div class="lbl">leads qualificados com ficha completa.</div>
    </div>
    <div class="stat">
      <div class="accent"></div>
      <div class="num">R$14<small>M</small></div>
      <div class="lbl">recorde nacional — Gabriela, cliente Hurtz.</div>
    </div>
  </div>
</body></html>
