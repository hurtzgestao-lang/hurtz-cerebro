<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<title>Hurtz · Proposta Comercial</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { background: #DDD7CB; padding: 48px; }
  h1 { font-size: 22px; margin-bottom: 4px;}
  p.lead { color: var(--grafite); margin-bottom: 28px; font-size: 13px; max-width: 600px;}
  .grid { display: grid; grid-template-columns: 720px 720px; gap: 36px; }
  .item { display: flex; flex-direction: column; gap: 10px;}
  .caption { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--pedra);}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <h1>Proposta comercial · A4 (4 páginas)</h1>
  <p class="lead">Capa · Escopo · Prova · Investimento. Off-white com uma única virada para Carvão na página de números, criando ritmo sem quebrar a paleta.</p>
  <div id="root"></div>

  <script type="text/babel" src="../meta-ads/MetaAd.jsx"></script>
  <script type="text/babel" src="Proposal.jsx"></script>
  <script type="text/babel">
    const { ProposalCover, ProposalScope, ProposalNumbers, ProposalPrice } = window;
    function App() {
      return (
        <div className="grid">
          <div className="item"><ProposalCover /><span className="caption">01 · Capa</span></div>
          <div className="item"><ProposalScope /><span className="caption">02 · Escopo</span></div>
          <div className="item"><ProposalNumbers /><span className="caption">03 · Prova</span></div>
          <div className="item"><ProposalPrice /><span className="caption">04 · Investimento</span></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body></html>
