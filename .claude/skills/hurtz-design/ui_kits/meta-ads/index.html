<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<title>Hurtz · Meta Ads UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { background: #EFEAE0; padding: 40px; }
  h1 { font-size: 22px; margin-bottom: 4px;}
  p.lead { color: var(--grafite); margin-bottom: 28px; font-size: 13px; max-width: 600px;}
  .grid { display: grid; grid-template-columns: repeat(3, 360px); gap: 28px; }
  .item { display: flex; flex-direction: column; gap: 10px; }
  .caption { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--pedra);}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <h1>Meta Ads · UI Kit</h1>
  <p class="lead">Três criativos 1:1 (1080×1080 simulados em 360×360). Fundo off-white ou carvão, headline Bold, CTA em Brasa Viva. Máximo 2 cores por criativo.</p>
  <div id="root"></div>

  <script type="text/babel" src="MetaAd.jsx"></script>
  <script type="text/babel">
    const { MetaAdLight, MetaAdDark, MetaAdStat } = window;
    function App() {
      return (
        <div className="grid">
          <div className="item"><MetaAdLight /><span className="caption">01 · Headline + CTA · fundo claro</span></div>
          <div className="item"><MetaAdDark /><span className="caption">02 · Case · fundo carvão</span></div>
          <div className="item"><MetaAdStat /><span className="caption">03 · Prova de operação</span></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body></html>
